<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration WiFi</title>
   
   <link rel="stylesheet" href="css/style-wifi.css" />
    
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 20C16.4183 20 20 16.4183 20 12C20 7.58172 16.4183 4 12 4C7.58172 4 4 7.58172 4 12C4 16.4183 7.58172 20 12 20Z" stroke="#6e8efb" stroke-width="2"/>
                <path d="M12 16C14.2091 16 16 14.2091 16 12C16 9.79086 14.2091 8 12 8C9.79086 8 8 9.79086 8 12C8 14.2091 9.79086 16 12 16Z" stroke="#a777e3" stroke-width="2"/>
                <path d="M12 13C12.5523 13 13 12.5523 13 12C13 11.4477 12.5523 11 12 11C11.4477 11 11 11.4477 11 12C11 12.5523 11.4477 13 12 13Z" fill="#6e8efb"/>
            </svg>
        </div>
        
        <h1>WiFi Configuration </h1>
        
        <p class="description">
            Configure your ESP32's WiFi settings. Enter the network name (SSID) and password to connect.
        </p>
		
		
		
		
		
		
		
        
        <form id="wifiForm">
			<div class="form-group">
                <label>Connexion Mode:</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="infrastructure" name="connectionMode" value="STA" checked>
                        <label for="infrastructure">Infrastructure (Modem)     </label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="adhoc" name="connectionMode" value="AP">
                        <label for="adhoc">Ad-hoc (ESP32)</label>
                    </div>
                </div>
            </div>
			
			
			
			
			
	         <div class="form-group">
				 <label for="wifiNetwork">WIFI LAN:</label>
				
					
					<select  id="wifiNetwork" name="wifiNetwork" required>
						 <option value="">Scanning ...</option>
					 </select>
					  <div class="button-group">
							<button type="button" id="newScanButton" class="button">NEW SCAN</button
					 </div>	  
					
             </div>
			
			
			
			

            
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required placeholder="Enter password">
            </div>
            
            <div class="button-group">
                <button type="submit" id="SaveConfigButton" class="button">SAVE CONFIG </button>
                <button type="button" id="cancelButton" class="button" onclick="window.location.href='index.html'">CANCEL<br>
                </button>
            </div>
        </form>
        
        <div id="statusMessage" class="status-message"></div>
    </div>


	    <script src="js/script-wifi.js"></script>
</body>
</html>
